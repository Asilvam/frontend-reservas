<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="22; url=/home" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Tenemos alta demanda — Llueve en Quilicura</title>
    <script>
      window.setTimeout(() => {
        window.location.replace('/home');
      }, 20000);
    </script>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
          Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #0f172a;
      }

      .home-layout {
        min-height: 100vh;
        padding: 1.2rem 1rem 1.4rem;
        background-image: url('./maintenance/Fondo.jpg');
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .home-header-wrap {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
      }

      .home-header-image {
        width: min(96vw, 700px);
        max-height: 70px;
        object-fit: contain;
        display: block;
      }

      .home-main-logo {
        width: min(94vw, 430px);
        max-height: 220px;
        object-fit: contain;
        display: block;
        filter: drop-shadow(0 14px 18px rgba(15, 23, 42, 0.26));
      }

      .maintenance-wrap {
        width: 100%;
        max-width: 980px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1 1 auto;
        padding: 1rem 0;
      }

      .maintenance-card {
        width: 100%;
        max-width: 560px;
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 30px;
        border: 2px solid rgba(255, 255, 255, 0.45);
        box-shadow: 0 16px 36px -24px rgba(30, 41, 59, 0.65);
        padding: 2.4rem 1.8rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
        text-align: center;
      }

      .maintenance-icon {
        width: 72px;
        height: 72px;
        color: #4338ca;
        animation: maintenance-pulse 2.4s ease-in-out infinite;
      }

      @keyframes maintenance-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.06);
          opacity: 0.85;
        }
      }

      .maintenance-title {
        margin: 0;
        color: #3730a3;
        font-weight: 800;
        font-size: 1.8rem;
        line-height: 1.25;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        max-width: 92%;
      }

      .home-footer-logos-wrap {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-top: auto;
      }

      .home-footer-logos {
        width: min(96vw, 430px);
        max-height: 68px;
        object-fit: contain;
        display: block;
        filter: drop-shadow(0 8px 14px rgba(79, 70, 229, 0.18));
      }

      @media (max-width: 900px) {
        .home-layout {
          gap: 0.8rem;
          padding: 0.8rem 0.65rem 1rem;
        }

        .home-main-logo {
          width: min(96vw, 360px);
          max-height: 170px;
        }

        .maintenance-card {
          border-radius: 22px;
          padding: 1.8rem 1.2rem;
          gap: 1rem;
        }

        .maintenance-icon {
          width: 60px;
          height: 60px;
        }

        .maintenance-title {
          font-size: 1.4rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="home-layout">
      <div class="home-header-wrap">
        <img
          class="home-header-image"
          src="./maintenance/superioralcaldia.png"
          alt="Superior Alcaldía"
        />
        <img
          class="home-main-logo"
          src="./maintenance/logo.png"
          alt="Llueve en Quilicura"
        />
      </div>

      <div class="maintenance-wrap">
        <div class="maintenance-card" role="status" aria-live="polite">
          <svg
            class="maintenance-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M5 2h14" />
            <path d="M5 22h14" />
            <path d="M7 2v4a5 5 0 0 0 10 0V2" />
            <path d="M7 22v-4a5 5 0 0 1 10 0v4" />
          </svg>
          <h1 class="maintenance-title">
            Tenemos una alta demanda de cupos, volvemos pronto...
          </h1>
        </div>
      </div>

      <div class="home-footer-logos-wrap">
        <img
          class="home-footer-logos"
          src="./maintenance/logos.png"
          alt="Logos institucionales"
        />
      </div>
    </div>
  </body>
</html>
